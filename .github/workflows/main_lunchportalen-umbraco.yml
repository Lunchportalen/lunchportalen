# Umbraco CMS — Azure App Service (lunchportalen-umbraco)
# Builds and deploys only ./Umbraco/Umbraco.csproj (not Next.js / repo root).
#
# OIDC (azure/login): App registration must have a federated identity credential for GitHub
# (issuer https://token.actions.githubusercontent.com). If missing, Azure returns AADSTS70025
# and the deploy job fails at "Azure login" with no webapps-deploy.
name: Umbraco CMS — Azure Web App deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  UMBRACO_CSPROJ: ./Umbraco/Umbraco.csproj

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Single publish aligns NuGet restore with Release. Do NOT split into
      # restore + build --no-restore + publish --no-build: default restore (Debug)
      # with --no-restore/--no-build leaves Umbraco.Cms.DevelopmentMode.Backoffice in deps.json.
      - name: dotnet publish (Release)
        run: dotnet publish "${{ env.UMBRACO_CSPROJ }}" --configuration Release --output "${{ github.workspace }}/publish/umbraco-app"

      # Fail before artifact upload if publish graph still included dev backoffice (matches Kudu checks).
      - name: Verify publish output (no DevelopmentMode backoffice)
        shell: bash
        env:
          PUBLISH_DIR: ${{ github.workspace }}/publish/umbraco-app
        run: |
          set -euo pipefail
          echo "::group::Git commit deployed by this build"
          git log -1 --oneline
          git rev-parse HEAD
          echo "::endgroup::"

          if [[ ! -d "$PUBLISH_DIR" ]]; then
            echo "::error::Publish directory is missing or not a directory: $PUBLISH_DIR"
            exit 1
          fi

          echo "::group::Publish folder sample (first 50 entries, best-effort listing)"
          # Do not let diagnostic listing fail the job: ls|head under pipefail can exit 2 (ls) or break on SIGPIPE.
          ls -la "$PUBLISH_DIR" 2>&1 | head -n 50 || true
          echo "::endgroup::"

          if [[ -f "$PUBLISH_DIR/Umbraco.Cms.DevelopmentMode.Backoffice.dll" ]]; then
            echo "::error::Umbraco.Cms.DevelopmentMode.Backoffice.dll must not be in Release publish output."
            exit 1
          fi
          DEPS="$PUBLISH_DIR/Umbraco.deps.json"
          if [[ ! -f "$DEPS" ]]; then
            echo "::error::Missing Umbraco.deps.json in publish output."
            exit 1
          fi
          if grep -qF -- "DevelopmentMode.Backoffice" "$DEPS"; then
            echo "::error::Umbraco.deps.json must not reference DevelopmentMode.Backoffice in Release."
            grep -n "DevelopmentMode" "$DEPS" | head -20 || true
            exit 1
          fi
          echo "OK: Release publish artifact is clean of Umbraco.Cms.DevelopmentMode.Backoffice."

      - name: Upload umbraco-app artifact
        uses: actions/upload-artifact@v4
        with:
          name: umbraco-app
          path: ${{ github.workspace }}/publish/umbraco-app

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download umbraco-app artifact
        uses: actions/download-artifact@v4
        with:
          name: umbraco-app
          path: ${{ github.workspace }}/umbraco-app

      - name: Deploy context (triggering commit + run)
        run: |
          echo "Triggering commit SHA: ${GITHUB_SHA}"
          echo "Workflow run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: "lunchportalen-umbraco"
          package: ${{ github.workspace }}/umbraco-app
