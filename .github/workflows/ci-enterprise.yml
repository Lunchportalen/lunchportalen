# Release gate: npm run ci:critical (docs/RELEASE_GATE.md). PROOF/audit logging; api/repo audits run but do not fail the job (see warnings).
name: CI Enterprise

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ci-enterprise-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enterprise:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # ✅ RC audit mode (deterministisk)
      RC_MODE: "true"
      CI_MODE: "rc"
      NODE_OPTIONS: "--max-old-space-size=8192"

      # ✅ Required runtime secrets
      SYSTEM_MOTOR_SECRET: ${{ secrets.SYSTEM_MOTOR_SECRET }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ✅ Optional / if present (leave blank if not set)
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
      NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
      SANITY_API_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      # 🔒 Fail-fast – krystallklar feilmelding hvis secrets mangler
      - name: Verify required env
        shell: bash
        run: |
          set -euo pipefail
          : "${SYSTEM_MOTOR_SECRET:?Missing SYSTEM_MOTOR_SECRET secret}"
          : "${NEXT_PUBLIC_SUPABASE_URL:?Missing NEXT_PUBLIC_SUPABASE_URL secret}"
          : "${NEXT_PUBLIC_SUPABASE_ANON_KEY:?Missing NEXT_PUBLIC_SUPABASE_ANON_KEY secret}"
          : "${SUPABASE_SERVICE_ROLE_KEY:?Missing SUPABASE_SERVICE_ROLE_KEY secret}"
          echo "✅ Required env present."
          echo "✅ RC_MODE=$RC_MODE CI_MODE=$CI_MODE"

      # 🔎 PROOF – viser nøyaktig commit, scripts og hvilken audit-kommando CI faktisk kjører
      - name: PROOF (commit + audit fingerprint)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== COMMIT ==="
          git rev-parse HEAD

          echo "=== PACKAGE SCRIPTS (audit:api / audit:repo / ci:enterprise / build:enterprise) ==="
          node -e "const p=require('./package.json'); console.log('audit:api=', p.scripts['audit:api']); console.log('audit:repo=', p.scripts['audit:repo']); console.log('ci:enterprise=', p.scripts['ci:enterprise']); console.log('build:enterprise=', p.scripts['build:enterprise']);"

          echo "=== SCRIPT HASH (audit-api-routes.mjs / audit-repo.mjs) ==="
          sha256sum scripts/audit-api-routes.mjs scripts/audit-repo.mjs 2>/dev/null || (shasum -a 256 scripts/audit-api-routes.mjs scripts/audit-repo.mjs)

          echo "=== SCRIPT HEAD (first 30 lines) ==="
          sed -n '1,30p' scripts/audit-api-routes.mjs
          echo "---"
          sed -n '1,30p' scripts/audit-repo.mjs

          echo "=== ENV ==="
          echo "RC_MODE=$RC_MODE CI_MODE=$CI_MODE CI=$CI"

      - name: "Guard: ban legacy audit-repo.js forever"
        shell: bash
        run: |
          set -euo pipefail
          if git grep -n "audit-repo\.js" -- . ':!package-lock.json' ':!.github/workflows/ci-enterprise.yml'; then
            echo "❌ Legacy audit-repo reference found. Use audit-repo.mjs only."
            exit 1
          fi
          echo "✅ No legacy audit-repo references."

      - name: "Guard: audit-repo.mjs must exist"
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f scripts/audit-repo.mjs ]; then
            echo "❌ scripts/audit-repo.mjs is missing in this commit"
            ls -la scripts || true
            exit 1
          fi
          echo "✅ scripts/audit-repo.mjs exists"

      # ✅ Enterprise gate (explicit, deterministic)
      - name: Enterprise gate (RC, explicit) - pre-audit
        shell: bash
        env:
          NODE_ENV: test
        run: |
          set -euo pipefail

          echo "==> platform guards"
          npm run ci:platform-guards

          echo "==> typecheck"
          npm run typecheck

          echo "==> tests"
          npm run test:run

          echo "==> tenant tests"
          npm run test:tenant

          echo "==> lint"
          npm run lint

          echo "==> audit:api (RC_MODE must be true) — runs always; exit non-zero does not fail this job"
          node -e "console.log('[CI AUDIT ENV]', { RC_MODE: process.env.RC_MODE, CI_MODE: process.env.CI_MODE, CI: process.env.CI });"
          npm run audit:api || echo "::warning::audit:api exited non-zero (non-blocking for enterprise gate)"

      - name: PROOF (resolved audit:repo)
        shell: bash
        run: |
          set -euo pipefail
          git rev-parse HEAD
          node -e "const p=require('./package.json'); console.log('audit:repo =>', p.scripts['audit:repo'])"
          ls -la scripts | sed -n '1,120p'

      - name: audit:repo
        shell: bash
        run: |
          set -euo pipefail
          echo "==> audit:repo (runs always; exit non-zero does not fail this job)"
          npm run audit:repo || echo "::warning::audit:repo exited non-zero (non-blocking for enterprise gate)"

      - name: Enterprise gate (RC, explicit) - post-audit
        shell: bash
        env:
          RC_MODE: "true"
          NODE_OPTIONS: "--max-old-space-size=8192"
        run: |
          set -euo pipefail

          echo "==> admin copy check"
          npm run check:admin-copy

          echo "==> agents:check"
          npm run agents:check

          # Same sequence as package.json `build:enterprise`, but audit:api / audit:repo are non-blocking (log only).
          echo "==> build:enterprise (production build; audits non-blocking)"
          npm run agents:check && \
            npm run ci:platform-guards && \
            (npm run audit:api || echo "::warning::audit:api exited non-zero (non-blocking for enterprise gate)") && \
            (npm run audit:repo || echo "::warning::audit:repo exited non-zero (non-blocking for enterprise gate)") && \
            npm run check:admin-copy && \
            npm run check:ai-internal-provider && \
            node scripts/verify-control-coverage.mjs && \
            npx next build && \
            node scripts/seo-proof.mjs && \
            node scripts/seo-audit.mjs && \
            node scripts/seo-content-lint.mjs
