name: "CI: enterprise"

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  enterprise:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run enterprise gate
        run: npm run ci:critical
