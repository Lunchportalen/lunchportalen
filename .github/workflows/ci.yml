# Main CI. Release gate (reproducible locally): npm run ci:critical — see docs/RELEASE_GATE.md
# All steps blocking: ci:guard → typecheck → lint → test:run → test:tenant → build:enterprise:ci (+ informational audits)
name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RC_MODE: "true"
      CI: "true"
      # Next.js production compile is memory-heavy; matches package.json build scripts.
      NODE_OPTIONS: "--max-old-space-size=8192"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: CI Guard
        run: npm run ci:guard

      - name: Platform guards (API contract, status, mocks, CMS, AI, UI)
        run: npm run ci:platform-guards

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        env:
          NODE_ENV: test
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run test:run

      - name: Tenant isolation test
        env:
          NODE_ENV: test
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run test:tenant

      - name: Verify required secrets
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          NEXT_PUBLIC_SANITY_PROJECT_ID: "${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}"
          NEXT_PUBLIC_SANITY_DATASET: "${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}"
          NEXT_PUBLIC_SANITY_API_VERSION: "${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}"
          SANITY_API_TOKEN: "${{ secrets.SANITY_WRITE_TOKEN }}"
          SYSTEM_MOTOR_SECRET: "${{ secrets.SYSTEM_MOTOR_SECRET }}"
        run: |
          set -euo pipefail
          : "${NEXT_PUBLIC_SUPABASE_URL:?Missing NEXT_PUBLIC_SUPABASE_URL secret}"
          : "${NEXT_PUBLIC_SUPABASE_ANON_KEY:?Missing NEXT_PUBLIC_SUPABASE_ANON_KEY secret}"
          : "${SUPABASE_SERVICE_ROLE_KEY:?Missing SUPABASE_SERVICE_ROLE_KEY secret}"
          : "${NEXT_PUBLIC_SANITY_PROJECT_ID:?Missing NEXT_PUBLIC_SANITY_PROJECT_ID secret}"
          : "${NEXT_PUBLIC_SANITY_DATASET:?Missing NEXT_PUBLIC_SANITY_DATASET secret}"
          : "${NEXT_PUBLIC_SANITY_API_VERSION:?Missing NEXT_PUBLIC_SANITY_API_VERSION secret}"
          : "${SANITY_API_TOKEN:?Missing SANITY_WRITE_TOKEN secret (mapped to SANITY_API_TOKEN)}"
          : "${SYSTEM_MOTOR_SECRET:?Missing SYSTEM_MOTOR_SECRET secret}"

      # Required gate: production compile + RC checks (build:enterprise:ci). Repo/API audits run after, informational only (see audit-api-routes.mjs exit 1 on unknown routes).
      - name: Build (Enterprise)
        env:
          SYSTEM_MOTOR_SECRET: "${{ secrets.SYSTEM_MOTOR_SECRET }}"
          NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          NEXT_PUBLIC_SANITY_PROJECT_ID: "${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}"
          NEXT_PUBLIC_SANITY_DATASET: "${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}"
          NEXT_PUBLIC_SANITY_API_VERSION: "${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}"
          SANITY_API_TOKEN: "${{ secrets.SANITY_WRITE_TOKEN }}"
        run: npm run build:enterprise:ci

      - name: Audit API routes (informational, non-blocking)
        continue-on-error: true
        env:
          RC_MODE: "true"
        run: npm run audit:api

      - name: Audit repository hygiene (informational, non-blocking)
        continue-on-error: true
        run: npm run audit:repo
