name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RC: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Lint (CI)
        run: npm run lint:ci

      # 🔒 Fail fast – krystallklar feilmelding hvis secrets mangler
      - name: Verify required secrets
        shell: bash
        env:
          # Supabase
          NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

          # Sanity
          NEXT_PUBLIC_SANITY_PROJECT_ID: "${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}"
          NEXT_PUBLIC_SANITY_DATASET: "${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}"
          NEXT_PUBLIC_SANITY_API_VERSION: "${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}"

          # Token (repo-secret SANITY_WRITE_TOKEN → runtime SANITY_API_TOKEN)
          SANITY_API_TOKEN: "${{ secrets.SANITY_WRITE_TOKEN }}"

        run: |
          set -euo pipefail

          : "${NEXT_PUBLIC_SUPABASE_URL:?Missing NEXT_PUBLIC_SUPABASE_URL secret}"
          : "${NEXT_PUBLIC_SUPABASE_ANON_KEY:?Missing NEXT_PUBLIC_SUPABASE_ANON_KEY secret}"
          : "${SUPABASE_SERVICE_ROLE_KEY:?Missing SUPABASE_SERVICE_ROLE_KEY secret}"

          : "${NEXT_PUBLIC_SANITY_PROJECT_ID:?Missing NEXT_PUBLIC_SANITY_PROJECT_ID secret}"
          : "${NEXT_PUBLIC_SANITY_DATASET:?Missing NEXT_PUBLIC_SANITY_DATASET secret}"
          : "${NEXT_PUBLIC_SANITY_API_VERSION:?Missing NEXT_PUBLIC_SANITY_API_VERSION secret}"

          : "${SANITY_API_TOKEN:?Missing SANITY_WRITE_TOKEN secret (mapped to SANITY_API_TOKEN)}"

      - name: Build (Enterprise)
        env:
          # System
          SYSTEM_MOTOR_SECRET: "${{ secrets.SYSTEM_MOTOR_SECRET }}"

          # Supabase
          NEXT_PUBLIC_SUPABASE_URL: "${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}"
          SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"

          # Sanity
          NEXT_PUBLIC_SANITY_PROJECT_ID: "${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}"
          NEXT_PUBLIC_SANITY_DATASET: "${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}"
          NEXT_PUBLIC_SANITY_API_VERSION: "${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}"

          # Sanity token
          SANITY_API_TOKEN: "${{ secrets.SANITY_WRITE_TOKEN }}"

        run: npm run build:enterprise
