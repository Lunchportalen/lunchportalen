name: CI (AGENTS gate)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  agents_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Guard required env (Sanity)
        shell: bash
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
        run: |
          set -euo pipefail
          if [[ -z "${NEXT_PUBLIC_SANITY_PROJECT_ID:-}" ]]; then
            echo "::error::Missing NEXT_PUBLIC_SANITY_PROJECT_ID (GitHub Actions secret)."
            exit 1
          fi
          if [[ -z "${NEXT_PUBLIC_SANITY_DATASET:-}" ]]; then
            echo "::error::Missing NEXT_PUBLIC_SANITY_DATASET (GitHub Actions secret)."
            exit 1
          fi

      - name: AGENTS gate
        run: npm run agents:check
        env:
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        env:
          NODE_ENV: test
        run: npm run test:run

      - name: Tenant isolation test
        env:
          NODE_ENV: test
        run: npm run test:tenant

      # Required gate: production build must pass.
      - name: Build enterprise
        shell: bash
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
        run: |
          set -euo pipefail
          export NEXT_PUBLIC_SANITY_PROJECT_ID
          export NEXT_PUBLIC_SANITY_DATASET
          npm run build:enterprise
