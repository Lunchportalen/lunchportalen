name: Codex – Critical Audit & Autofix

on:
  schedule:
    - cron: "0 20 * * *" # hver dag 20:00
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-critical-audit-autofix
  cancel-in-progress: false

jobs:
  audit_autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # -------------------------
      # Run baseline critical gate
      # -------------------------
      - name: Run critical checks (capture log)
        id: critical
        shell: bash
        run: |
          set +e
          npm run ci:critical > critical.log 2>&1
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload critical.log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: critical-log
          path: critical.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop if ci:critical is green
        if: steps.critical.outputs.exitcode == '0'
        run: echo "✅ ci:critical is green. No changes needed."

      # -------------------------
      # Only from here if failing
      # -------------------------
      - name: Verify OPENAI_API_KEY secret
        if: steps.critical.outputs.exitcode != '0'
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          : "${OPENAI_API_KEY:?Missing OPENAI_API_KEY secret (Repo → Settings → Actions → Secrets)}"

      # -------------------------
      # Run SDK-based autofix (NO codex CLI)
      # -------------------------
      - name: Run Codex audit + autofix (SDK)
        if: steps.critical.outputs.exitcode != '0'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5
        run: node scripts/codex-audit-autofix.mjs

      # 🔎 Detect whether a patch was produced
      - name: Detect patch (codex.patch)
        if: steps.critical.outputs.exitcode != '0'
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "codex.patch" ]; then
            echo "has_patch=true" >> "$GITHUB_OUTPUT"
            echo "✅ codex.patch found"
          else
            echo "has_patch=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No codex.patch produced (NO-OP)."
          fi

      - name: Upload patch artifacts (if any)
        if: steps.critical.outputs.exitcode != '0'
        uses: actions/upload-artifact@v4
        with:
          name: codex-patch-artifacts
          path: |
            codex.patch
            codex.raw.txt
          if-no-files-found: ignore
          retention-days: 7

      # ✅ If no patch was produced, we exit cleanly (green)
      - name: Stop (NO-OP) if no patch was produced
        if: steps.critical.outputs.exitcode != '0' && steps.patch.outputs.has_patch == 'false'
        run: echo "✅ No safe patch suggested. Exiting cleanly."

      # -------------------------
      # Re-run critical only if patch exists
      # -------------------------
      - name: Re-run critical checks after patch (capture log)
        if: steps.critical.outputs.exitcode != '0' && steps.patch.outputs.has_patch == 'true'
        id: critical_after
        shell: bash
        run: |
          set +e
          npm run ci:critical > critical.after.log 2>&1
          echo "exitcode=$?" >> "$GITHUB_OUTPUT"
          set -e

      - name: Upload critical.after.log (if patch path)
        if: steps.critical.outputs.exitcode != '0' && steps.patch.outputs.has_patch == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: critical-after-log
          path: critical.after.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop if still failing after patch
        if: steps.critical.outputs.exitcode != '0' && steps.patch.outputs.has_patch == 'true' && steps.critical_after.outputs.exitcode != '0'
        shell: bash
        run: |
          echo "❌ ci:critical is still failing after patch."
          echo "See critical.after.log (artifact) for details."
          exit 1

      # -------------------------
      # Guards (enterprise-safe) – only when patch exists
      # -------------------------
      - name: Guard – stop if patch is too large
        if: steps.critical.outputs.exitcode != '0' && steps.patch.outputs.has_patch == 'true'
        shell: bash
        run: |
          set -euo pipefail
          CHANGED=$(git diff --numstat | awk '{a+=$1; d+=$2} END{print a+d}')
          echo "Changed lines: ${CHANGED:-0}"
          if [ "${CHANGED:-0}" -gt 300 ]; then
            echo "❌ Patch too large (>300 lines). Stopping."
            exit 1
          fi

      - name: Guard – block forbidden core paths
        if: steps.critical.outputs.exitcode != '0' && steps.patch.outputs.has_patch == 'true'
        shell: bash
        run: |
          set -euo pipefail
          FORBIDDEN_REGEX='^(lib/auth/|lib/guards/|lib/http/routeGuard|lib/date/oslo/|lib/audit/|lib/orderBackup/|app/api/auth/|app/api/cron/)'
          CHANGED_FILES=$(git diff --name-only)
          HIT=$(echo "$CHANGED_FILES" | grep -E "$FORBIDDEN_REGEX" || true)
          if [ -n "$HIT" ]; then
            echo "❌ Forbidden paths touched by patch:"
            echo "$HIT"
            exit 1
          fi

      - name: Guard – no new dependencies (lock package-lock)
        if: steps.critical.outputs.exitcode != '0' && steps.patch.outputs.has_patch == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --name-only | grep -q '^package-lock\.json$'; then
            echo "❌ package-lock.json changed. New deps are not allowed in autofix."
            exit 1
          fi

      # -------------------------
      # Proceed only if there are actual changes (patch exists)
      # -------------------------
      - name: Detect changes
        if: steps.critical.outputs.exitcode != '0' && steps.patch.outputs.has_patch == 'true'
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes in working tree. Stopping."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if no changes
        if: steps.critical.outputs.exitcode != '0' && steps.patch.outputs.has_patch == 'true' && steps.changes.outputs.has_changes == 'false'
        run: exit 0

      - name: Prepare PR report
        if: steps.critical.outputs.exitcode != '0' && steps.patch.outputs.has_patch == 'true' && steps.changes.outputs.has_changes == 'true'
        id: report
        shell: bash
        run: |
          set -euo pipefail
          echo "## Automatisk patch (ci:critical)" > pr_body.md
          echo "" >> pr_body.md
          echo "**Gate:** \`npm run ci:critical\` + Vercel Preview required" >> pr_body.md
          echo "" >> pr_body.md

          echo "### Endringer (diffstat)" >> pr_body.md
          echo '```' >> pr_body.md
          git diff --stat >> pr_body.md
          echo '```' >> pr_body.md
          echo "" >> pr_body.md

          echo "### Endrede filer" >> pr_body.md
          echo '```' >> pr_body.md
          git diff --name-only >> pr_body.md
          echo '```' >> pr_body.md
          echo "" >> pr_body.md

          echo "### Artefakter" >> pr_body.md
          echo "- Se artifacts: critical.log, critical.after.log, codex.patch/codex.raw.txt" >> pr_body.md
          echo "" >> pr_body.md

          echo "body_path=pr_body.md" >> "$GITHUB_OUTPUT"

      # -------------------------
      # Create PR (handles commit + branch + push) — robust
      # -------------------------
      - name: Create pull request (commit + push + PR)
        if: steps.critical.outputs.exitcode != '0' && steps.patch.outputs.has_patch == 'true' && steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: bot/codex-autofix
          delete-branch: false
          title: "fix(critical): automated patch"
          commit-message: "fix(critical): automated patch"
          body-path: ${{ steps.report.outputs.body_path }}
          labels: |
            autofix
            risk:low
