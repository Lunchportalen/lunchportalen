name: Codex – Design System & UX Polish

on:
  workflow_dispatch:
  schedule:
    - cron: "15 20 * * *" # daily 20:15

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: codex-design-system
  cancel-in-progress: false

jobs:
  design_system:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify OPENAI_API_KEY secret
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          : "${OPENAI_API_KEY:?Missing OPENAI_API_KEY secret}"

      - name: Create design branch
        id: branch
        shell: bash
        run: |
          set -euo pipefail
          BR="bot/codex-design-$(date +%Y%m%d-%H%M%S)"
          echo "branch=$BR" >> "$GITHUB_OUTPUT"
          git checkout -b "$BR"

      - name: Run Codex design system patch (SDK)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-5
        run: node scripts/codex-design-system.mjs

      - name: Detect patch (codex.design.patch)
        id: patch
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "codex.design.patch" ]; then
            echo "has_patch=true" >> "$GITHUB_OUTPUT"
            echo "✅ codex.design.patch found"
          else
            echo "has_patch=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️ No patch produced (NO-OP)."
          fi

      - name: Upload design artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-design-artifacts
          path: |
            codex.design.patch
            codex.design.raw.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Stop (NO-OP) if no patch was produced
        if: steps.patch.outputs.has_patch == 'false'
        run: echo "✅ No safe design patch suggested. Exiting cleanly."

      # Guards – conservative
      - name: Guard – stop if patch is too large
        if: steps.patch.outputs.has_patch == 'true'
        shell: bash
        run: |
          set -euo pipefail
          CHANGED=$(git diff --numstat | awk '{a+=$1; d+=$2} END{print a+d}')
          echo "Changed lines: ${CHANGED:-0}"
          if [ "${CHANGED:-0}" -gt 800 ]; then
            echo "❌ Patch too large (>800 lines). Stopping."
            exit 1
          fi

      - name: Guard – block forbidden core paths
        if: steps.patch.outputs.has_patch == 'true'
        shell: bash
        run: |
          set -euo pipefail
          FORBIDDEN_REGEX='^(lib/auth/|lib/guards/|lib/http/routeGuard|lib/date/oslo/|lib/audit/|lib/orderBackup/|app/api/auth/|app/api/cron/|supabase/|studio/)'
          CHANGED_FILES=$(git diff --name-only)
          HIT=$(echo "$CHANGED_FILES" | grep -E "$FORBIDDEN_REGEX" || true)
          if [ -n "$HIT" ]; then
            echo "❌ Forbidden paths touched by design patch:"
            echo "$HIT"
            exit 1
          fi

      - name: Guard – no new dependencies (lock package-lock)
        if: steps.patch.outputs.has_patch == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if git diff --name-only | grep -q '^package-lock\.json$'; then
            echo "❌ package-lock.json changed. New deps are not allowed in design patch."
            exit 1
          fi

      - name: Detect changes
        if: steps.patch.outputs.has_patch == 'true'
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes in working tree. Stopping."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Stop if no changes
        if: steps.patch.outputs.has_patch == 'true' && steps.changes.outputs.has_changes == 'false'
        run: exit 0

      - name: Prepare PR report
        if: steps.patch.outputs.has_patch == 'true' && steps.changes.outputs.has_changes == 'true'
        id: report
        shell: bash
        run: |
          set -euo pipefail
          echo "## Design System & UX polish" > pr_body.md
          echo "" >> pr_body.md
          echo "**Scope:** design tokens + UI components + page styling (no logic/auth changes)." >> pr_body.md
          echo "" >> pr_body.md
          echo "### Endringer (diffstat)" >> pr_body.md
          echo '```' >> pr_body.md
          git diff --stat >> pr_body.md
          echo '```' >> pr_body.md
          echo "" >> pr_body.md
          echo "### Endrede filer" >> pr_body.md
          echo '```' >> pr_body.md
          git diff --name-only >> pr_body.md
          echo '```' >> pr_body.md
          echo "" >> pr_body.md
          echo "body_path=pr_body.md" >> "$GITHUB_OUTPUT"

      - name: Commit changes
        if: steps.patch.outputs.has_patch == 'true' && steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git commit -m "chore(design): codex design system patch" || exit 0

      - name: Push branch
        if: steps.patch.outputs.has_patch == 'true' && steps.changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git push --set-upstream origin "${{ steps.branch.outputs.branch }}"

      - name: Open pull request
        if: steps.patch.outputs.has_patch == 'true' && steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.branch.outputs.branch }}
          title: "chore(design): design system + ux polish"
          body-path: ${{ steps.report.outputs.body_path }}
          labels: |
            design
            codex
            risk:low
