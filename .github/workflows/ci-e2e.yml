# Browser E2E + visual regression (Phase 6 — dedicated workflow; ci-enterprise unchanged)
name: CI E2E

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      RC_MODE: "true"
      CI: "true"
      NODE_OPTIONS: "--max-old-space-size=8192"
      PLAYWRIGHT_BASE_URL: "http://localhost:3000"
      SYSTEM_MOTOR_SECRET: ${{ secrets.SYSTEM_MOTOR_SECRET }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
      NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
      SANITY_API_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Verify required env
        shell: bash
        run: |
          set -euo pipefail
          : "${NEXT_PUBLIC_SUPABASE_URL:?Missing NEXT_PUBLIC_SUPABASE_URL secret}"
          : "${NEXT_PUBLIC_SUPABASE_ANON_KEY:?Missing NEXT_PUBLIC_SUPABASE_ANON_KEY secret}"
          : "${SUPABASE_SERVICE_ROLE_KEY:?Missing SUPABASE_SERVICE_ROLE_KEY secret}"
          echo "✅ Required env present."

      # Required gate: same production build as main CI; E2E runs against this build.
      - name: Build (Enterprise)
        env:
          SYSTEM_MOTOR_SECRET: ${{ secrets.SYSTEM_MOTOR_SECRET }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
          NEXT_PUBLIC_SANITY_API_VERSION: ${{ secrets.NEXT_PUBLIC_SANITY_API_VERSION }}
          SANITY_API_TOKEN: ${{ secrets.SANITY_WRITE_TOKEN }}
        run: npm run build:enterprise

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Bootstrap E2E env from secrets
        shell: bash
        env:
          E2E_TEST_USER_EMAIL: ${{ secrets['E2E_TEST_USER_EMAIL'] }}
          E2E_TEST_USER_PASSWORD: ${{ secrets['E2E_TEST_USER_PASSWORD'] }}
          E2E_EMPLOYEE_EMAIL: ${{ secrets['E2E_EMPLOYEE_EMAIL'] }}
          E2E_EMPLOYEE_PASSWORD: ${{ secrets['E2E_EMPLOYEE_PASSWORD'] }}
          E2E_ADMIN_EMAIL: ${{ secrets['E2E_ADMIN_EMAIL'] }}
          E2E_ADMIN_PASSWORD: ${{ secrets['E2E_ADMIN_PASSWORD'] }}
          E2E_SUPERADMIN_EMAIL: ${{ secrets['E2E_SUPERADMIN_EMAIL'] }}
          E2E_SUPERADMIN_PASSWORD: ${{ secrets['E2E_SUPERADMIN_PASSWORD'] }}
        run: |
          set -euo pipefail
          d=E2EENV__DELIM__LP
          {
            echo "E2E_TEST_USER_EMAIL<<${d}"
            printf '%s\n' "$E2E_TEST_USER_EMAIL"
            echo "${d}"
          } >> "$GITHUB_ENV"
          {
            echo "E2E_TEST_USER_PASSWORD<<${d}"
            printf '%s\n' "$E2E_TEST_USER_PASSWORD"
            echo "${d}"
          } >> "$GITHUB_ENV"
          {
            echo "E2E_EMPLOYEE_EMAIL<<${d}"
            printf '%s\n' "$E2E_EMPLOYEE_EMAIL"
            echo "${d}"
          } >> "$GITHUB_ENV"
          {
            echo "E2E_EMPLOYEE_PASSWORD<<${d}"
            printf '%s\n' "$E2E_EMPLOYEE_PASSWORD"
            echo "${d}"
          } >> "$GITHUB_ENV"
          {
            echo "E2E_ADMIN_EMAIL<<${d}"
            printf '%s\n' "$E2E_ADMIN_EMAIL"
            echo "${d}"
          } >> "$GITHUB_ENV"
          {
            echo "E2E_ADMIN_PASSWORD<<${d}"
            printf '%s\n' "$E2E_ADMIN_PASSWORD"
            echo "${d}"
          } >> "$GITHUB_ENV"
          {
            echo "E2E_SUPERADMIN_EMAIL<<${d}"
            printf '%s\n' "$E2E_SUPERADMIN_EMAIL"
            echo "${d}"
          } >> "$GITHUB_ENV"
          {
            echo "E2E_SUPERADMIN_PASSWORD<<${d}"
            printf '%s\n' "$E2E_SUPERADMIN_PASSWORD"
            echo "${d}"
          } >> "$GITHUB_ENV"

      - name: Start server and run E2E
        run: |
          npm run start &
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 2 http://localhost:3000/ || true)
            if [[ "$code" =~ ^[23][0-9][0-9]$ ]]; then echo "Server ready ($code)"; break; fi
            if [ "$i" -eq 60 ]; then echo "Server did not become ready"; exit 1; fi
            sleep 2
          done
          npx playwright test --config playwright.config.ts --project=chromium
        env:
          PORT: 3000
          CI: "true"

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
